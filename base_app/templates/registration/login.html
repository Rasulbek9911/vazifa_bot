<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kirish</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.1); padding: 40px 36px; width: 100%; max-width: 380px; }
  .login-title { font-size: 1.4rem; font-weight: 700; color: #1a237e; margin-bottom: 6px; }
  .login-sub { font-size: .88rem; color: #888; margin-bottom: 28px; }
  .form-control { border-radius: 8px; padding: 10px 14px; border: 1px solid #ddd; }
  .form-control:focus { border-color: #1a237e; box-shadow: 0 0 0 3px rgba(26,35,126,.12); }
  .btn-login { background: #1a237e; color: #fff; border-radius: 8px; padding: 10px; font-weight: 600; width: 100%; border: none; }
  .btn-login:hover { background: #283593; color: #fff; }
  .error-msg { background: #f8d7da; color: #721c24; border-radius: 8px; padding: 10px 14px; font-size: .88rem; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-title">Vazifa Bot</div>
  <div class="login-sub">Tizimga kirish</div>

  {% if form.errors %}
  <div class="error-msg">Login yoki parol noto'g'ri</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label small fw-semibold">Login</label>
      <input type="text" name="username" class="form-control" placeholder="username" autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label small fw-semibold">Parol</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••">
    </div>
    <button type="submit" class="btn-login">Kirish</button>
  </form>
</div>
</body>
</html>
