services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    entrypoint: ./docker-entrypoint-web.sh
    env_file:
      - .env
    volumes:
      - static_volume:/var/www/vazifa_bot/staticfiles
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    restart: unless-stopped
    working_dir: /var/www/vazifa_bot/mukammal-bot-paid
    command: python app.py
    env_file:
      - .env
      - mukammal-bot-paid/.env
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/vazifa_bot/staticfiles:ro
    depends_on:
      - web

volumes:
  pgdata:
  static_volume:
